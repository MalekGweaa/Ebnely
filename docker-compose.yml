services:
  web:
    build:
      context: .
      args:
        VITE_APP_NAME: ${APP_NAME}
        VITE_REVERB_APP_KEY: ${REVERB_APP_KEY}
        VITE_REVERB_HOST: ${VITE_REVERB_HOST}
        VITE_REVERB_PORT: ${VITE_REVERB_PORT}
        VITE_REVERB_SCHEME: ${VITE_REVERB_SCHEME}
    image: ebnely:latest
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - uploads:/var/www/html/storage/app/public
      - sqlite_db:/var/www/html/database
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    restart: unless-stopped

  queue:
    image: ebnely:latest
    env_file: .env
    command: php artisan queue:work --tries=3 --timeout=90 --max-time=3600
    volumes:
      - uploads:/var/www/html/storage/app/public
      - sqlite_db:/var/www/html/database
    healthcheck:
      disable: true
    deploy:
      resources:
        limits:
          cpus: '0.15'
          memory: 256M
    restart: unless-stopped

  reverb:
    image: ebnely:latest
    env_file: .env
    command: php artisan reverb:start --host=0.0.0.0 --port=8080
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -s --connect-timeout 3 -o /dev/null http://localhost:8080/ || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.15'
          memory: 192M
    restart: unless-stopped

volumes:
  uploads:
  sqlite_db:
